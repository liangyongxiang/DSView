name: Build Windows Release

on:
  push:
    branches: [master]
    tags: ['v*']
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-windows-cli:
    runs-on: windows-latest
    defaults:
      run:
        shell: msys2 {0}
    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.13'

      - name: Setup MSYS2
        uses: msys2/setup-msys2@v2
        with:
          msystem: UCRT64
          update: true
          install: >-
            mingw-w64-ucrt-x86_64-cc
            mingw-w64-ucrt-x86_64-cmake
            mingw-w64-ucrt-x86_64-ninja
            mingw-w64-ucrt-x86_64-pkgconf
            mingw-w64-ucrt-x86_64-glib2
            mingw-w64-ucrt-x86_64-libusb
            mingw-w64-ucrt-x86_64-zlib

      - name: Configure
        run: |
          # Pin CMake to the Python that setup-python installed. MSYS2 ships
          # its own Python as a transitive dep, and the runner's preinstalled
          # toolcache Python is also on PATH; without this hint find_package
          # would link the exe against whichever it sees first (and the
          # release would then be missing the runtime DLL we just staged).
          cmake -S cli -B build -G Ninja \
            -DCMAKE_BUILD_TYPE=Release \
            -DPython3_EXECUTABLE="$pythonLocation/python.exe"

      - name: Build
        run: cmake --build build

      - name: Collect artifacts
        run: |
          mkdir -p release

          # build.dir/ is populated by the `stage-build-dir` custom target:
          # the main exe, decoders/, res/, demo/, and the Python stdlib land
          # next to each other. The CLI resolves all of these relative to
          # the executable's directory at runtime, so a flat layout is the
          # correct release shape.
          for entry in build.dir/*; do
            name="$(basename "$entry")"
            case "$name" in
              dsview-cli-*-test.exe) ;;  # skip test executables
              *) cp -r "$entry" release/ ;;
            esac
          done

          # The MinGW/UCRT64 runtime DLLs the exe links against dynamically
          # (libusb, winpthread, zlib) live in $MINGW_PREFIX/bin. Copy any
          # that the exe still needs but the stage script didn't pick up
          # (e.g. on installs where the Python and the toolchain are at
          # different roots).
          for dll in zlib1.dll libusb-1.0.dll libwinpthread-1.dll \
                     libgcc_s_seh-1.dll libffi-8.dll libiconv-2.dll \
                     libintl-8.dll libpcre2-8-0.dll libglib-2.0-0.dll; do
            if [ -f "$MINGW_PREFIX/bin/$dll" ] && [ ! -f "release/$dll" ]; then
              cp "$MINGW_PREFIX/bin/$dll" release/
            fi
          done

          # actions/setup-python installs the runtime DLL (e.g. python313.dll)
          # and the stdlib (Lib/) into $pythonLocation. Copy the runtime DLL
          # next to dsview-cli.exe and the stdlib under <exe_dir>/Python/lib/
          # so the loader and Py_SetPythonHome(<exe_dir>/Python) can both
          # resolve at runtime.
          if [ -n "$pythonLocation" ] && [ -d "$pythonLocation" ]; then
            for pydll in "$pythonLocation"/python3*.dll; do
              [ -f "$pydll" ] && cp "$pydll" release/
            done

            PY_BIN="$pythonLocation/python.exe"
            if [ ! -x "$PY_BIN" ]; then
              PY_BIN="python"
            fi
            PY_DOTTED=$("$PY_BIN" -c "import sys; print(f'{sys.version_info.major}.{sys.version_info.minor}')" 2>/dev/null)
            PY_SHORT=$("$PY_BIN" -c "import sys; print(f'{sys.version_info.major}{sys.version_info.minor}')" 2>/dev/null)

            if [ -n "$PY_DOTTED" ]; then
              STDLIB_DST="release/Python/lib/python${PY_DOTTED}"
              mkdir -p "$STDLIB_DST"
              for src in "$pythonLocation/Lib" \
                         "$pythonLocation/lib/python${PY_DOTTED}"; do
                if [ -d "$src" ]; then
                  cp -r "$src"/. "$STDLIB_DST"/
                  echo "Staged stdlib: $src -> $STDLIB_DST"
                  break
                fi
              done

              for zip in "$pythonLocation"/python${PY_SHORT}.zip \
                         "$pythonLocation"/lib/python${PY_SHORT}.zip \
                         "$pythonLocation"/lib/python${PY_DOTTED}.zip; do
                if [ -f "$zip" ]; then
                  cp "$zip" "release/Python/lib/"
                  echo "Staged stdlib zip: $zip"
                  break
                fi
              done
            fi
          fi

          echo "=== Release artifacts ==="
          ls -la release/

          # Sanity check: any non-system DLL that dsview-cli.exe imports must
          # be present in the release tree. This catches future regressions
          # where the stage list drifts away from what the exe actually needs.
          echo "=== Verifying DLL closure ==="
          missing=0
          shopt -s nocasematch
          for dll in $(objdump -p release/dsview-cli.exe 2>/dev/null \
                        | grep 'DLL Name:' \
                        | awk '{print $3}'); do
            case "$dll" in
              *.dll)
                case "$dll" in
                  API-MS-WIN-*|EXT-MS-WIN-*|KERNEL32.dll|USER32.dll|SHELL32.dll|ole32.dll|oleaut32.dll|GDI32.dll|WINMM.dll|WS2_32.dll|ADVAPI32.dll|CRYPT32.dll|SECUR32.dll|RPCRT4.dll|VCRUNTIME140*|MSVCP140*|CONCRT140*) ;;
                  *) if [ ! -f "release/$dll" ]; then
                       echo "MISSING: $dll"
                       missing=1
                     fi ;;
                esac
                ;;
            esac
          done
          if [ "$missing" -ne 0 ]; then
            echo "::error::Release is missing DLLs required by dsview-cli.exe"
            exit 1
          fi
          echo "DLL closure verified."

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: dsview-cli-windows-x86_64
          path: release/*

      - name: Create zip
        if: startsWith(github.ref, 'refs/tags/v')
        shell: pwsh
        run: Compress-Archive -Path release\* -DestinationPath dsview-cli-windows-x86_64.zip

      - name: Create Release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v1
        with:
          files: dsview-cli-windows-x86_64.zip
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
