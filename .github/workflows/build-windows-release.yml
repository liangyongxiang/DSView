name: Build Windows Release

on:
  push:
    branches: [master]
    tags: ['v*']
  workflow_dispatch:

jobs:
  build-windows-cli:
    runs-on: windows-latest
    defaults:
      run:
        shell: msys2 {0}
    steps:
      - uses: actions/checkout@v4

      - name: Setup MSYS2
        uses: msys2/setup-msys2@v2
        with:
          msystem: UCRT64
          update: true
          install: >-
            mingw-w64-ucrt-x86_64-cc
            mingw-w64-ucrt-x86_64-cmake
            mingw-w64-ucrt-x86_64-ninja
            mingw-w64-ucrt-x86_64-pkgconf
            mingw-w64-ucrt-x86_64-glib2
            mingw-w64-ucrt-x86_64-libusb
            mingw-w64-ucrt-x86_64-zlib
            mingw-w64-ucrt-x86_64-python

      - name: Configure
        run: |
          cmake -S cli -B build -G Ninja \
            -DCMAKE_BUILD_TYPE=Release

      - name: Build
        run: cmake --build build

      - name: Collect artifacts
        run: |
          mkdir -p release

          # Copy exe (cmake outputs to build.dir per RUNTIME_OUTPUT_DIRECTORY)
          cp build.dir/dsview-cli.exe release/

          # Collect MinGW DLLs the exe depends on (recursive)
          declare -A COPIED
          copy_deps() {
            local exe="$1"
            local dll_dir="$MINGW_PREFIX/bin"
            for dll in $(objdump -p "$exe" 2>/dev/null | grep 'DLL Name:' | awk '{print $3}'); do
              local src="$dll_dir/$dll"
              if [ -f "$src" ] && [ -z "${COPIED[$dll]}" ]; then
                COPIED[$dll]=1
                cp "$src" release/
                copy_deps "$src"
              fi
            done
          }
          copy_deps "build.dir/dsview-cli.exe"

          echo "=== Release artifacts ==="
          ls -la release/

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: dsview-cli-windows-x86_64
          path: release/*

      - name: Create zip
        if: startsWith(github.ref, 'refs/tags/v')
        shell: pwsh
        run: Compress-Archive -Path release\* -DestinationPath dsview-cli-windows-x86_64.zip

      - name: Create Release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v1
        with:
          files: dsview-cli-windows-x86_64.zip
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
